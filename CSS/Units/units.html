<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#edf2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:340px;
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.top{
    height:205px;
    background:#4c6ef5;
    position:relative;
}

.profile{
    position:absolute;
    left:50%;
    bottom:-68px;
    transform:translateX(-50%);
    width:138px;
    height:138px;
    border-radius:50%;
    padding:5px;
    background:#fff;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
    border:4px solid #4c6ef5;
}

.content{
    padding:82px 25px 28px;
    text-align:center;
}

.content h2{
    font-size:36px;
    font-weight:600;
    color:#222;
}

.content p{
    margin-top:4px;
    color:#555;
    font-size:20px;
    font-weight:500;
}

.social{
    margin:28px 0;
    display:flex;
    justify-content:center;
    gap:18px;
}

.social a{
    width:52px;
    height:52px;
    border-radius:50%;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-size:22px;
}

.facebook{background:#4267B2;}
.twitter{background:#1DA1F2;}
.instagram{
background:#E1306C;
}
.youtube{background:#FF0000;}

.buttons{
    display:flex;
    justify-content:center;
    gap:22px;
    margin-bottom:28px;
}

.buttons button{
    width:135px;
    height:50px;
    border:none;
    border-radius:50px;
    background:#4c6ef5;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.buttons button:hover{
    background:#3657e6;
}

.stats{
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #eee;
    padding-top:22px;
}

.item{
    display:flex;
    align-items:center;
    gap:8px;
    color:#333;
    font-size:22px;
}

.item i{
    font-size:20px;
    color:#444;
}

.divider{
    width:1px;
    height:28px;
    background:#ddd;
}

</style>

</head>
<body>

<div class="card">

    <div class="top">

        <div class="profile">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500&q=80" alt="profile_img">
        </div>

    </div>

    <div class="content">

        <h2>CodingLab</h2>
        <p>YouTuber & Blogger</p>

        <div class="social">

            <a href="#" class="facebook">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a href="#" class="twitter">
                <i class="fab fa-twitter"></i>
            </a>

            <a href="#" class="instagram">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="#" class="youtube">
                <i class="fab fa-youtube"></i>
            </a>

        </div>

        <div class="buttons">
            <button>Subscribe</button>
            <button>Message</button>
        </div>

        <div class="stats">

            <div class="item">
                <i class="far fa-heart"></i>
                <span>60.4k</span>
            </div>

            <div class="divider"></div>

            <div class="item">
                <i class="far fa-comment"></i>
                <span>20k</span>
            </div>

            <div class="divider"></div>

            <div class="item">
                <i class="fas fa-share"></i>
                <span>12.4k</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
