<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnvSoft-Example</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <h2 class="sidebar-title">Technologies</h2>
        <nav class="menu">
          <a href="#" class="menu-item active">
            <i class="fa-solid fa-desktop"></i>
            <span>Frontend</span>
          </a>
          <a href="#" class="menu-item">
            <i class="fa-solid fa-server"></i>
            <span>Backend</span>
          </a>
          <a href="#" class="menu-item">
            <i class="fa-solid fa-mobile-screen"></i>
            <span>Mobile</span>
          </a>
          <a href="#" class="menu-item">
            <i class="fa-solid fa-layer-group"></i>
            <span>Platforms</span>
          </a>
          <a href="#" class="menu-item active">
            <i class="fa-solid fa-database"></i>
            <span>Databases</span>
          </a>
        </nav>
      </aside>
      <main class="main-content">
        <header class="content-header">
          <div class="header-icon">
            <i class="fa-solid fa-desktop"></i>
          </div>
          <div class="header-title-container">
            <h1 class="header-title">Databases</h1>
          </div>
        </header>
        <div class="cards-grid">
          <div class="card">
            <div class="card-icon">
              <i class="fa-solid fa-database"></i>
            </div>
            <span class="card-title">MySql</span>
          </div>

          <div class="card">
            <div class="card-icon">
              <i class="fa-solid fa-database"></i>
            </div>
            <span class="card-title">PostgreSql</span>
          </div>
          <div class="card">
            <div class="card-icon">
              <i
                class="fa-brands fa-microsoft"
                style="color: rgb(116, 192, 252)"
              ></i>
            </div>
            <span class="card-title">Sql Server</span>
          </div>
          <div class="card">
            <div class="card-icon">
              <i class="fa-solid fa-leaf" style="color: rgb(219, 171, 0)"></i>
            </div>
            <span class="card-title">MongoDB</span>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
