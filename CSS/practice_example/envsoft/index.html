<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnvSoft-Example</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <h2 class="sidebar-title">Technologies</h2>
        <nav class="menu">
          <a href="#" class="menu-item active">
            <i class="fa-solid fa-desktop"></i>
            <span>Frontend</span>
          </a>
          <a href="#" class="menu-item">
            <i class="fa-solid fa-server"></i>
            <span>Backend</span>
          </a>
          <a href="#" class="menu-item">
            <i class="fa-solid fa-mobile-screen"></i>
            <span>Mobile</span>
          </a>
          <a href="#" class="menu-item">
            <i class="fa-solid fa-layer-group"></i>
            <span>Platforms</span>
          </a>
          <a href="#" class="menu-item">
            <i class="fa-solid fa-database"></i>
            <span>Databases</span>
          </a>
        </nav>
      </aside>
      <main class="main-content">
        <header class="content-header">
          <div class="header-icon">
            <i class="fa-solid fa-desktop"></i>
          </div>
          <div class="header-title-container">
            <h1 class="header-title">Frontend</h1>
          </div>
        </header>
        <div class="cards-grid">
          <div class="card">
            <div class="card-icon">
              <i class="fa-brands fa-angular" style="color: rgb(240, 18, 18); font-size: 45px;"></i>
            </div>
            <span class="card-title">AngularJS</span>
          </div>

          <div class="card">
            <div class="card-icon">
              <img
                src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg"
                alt="ReactJS"
              />
            </div>
            <span class="card-title">ReactJS</span>
          </div>
          <div class="card">
            <div class="card-icon">
              <img
                src="https://upload.wikimedia.org/wikipedia/commons/9/95/Vue.js_Logo_2.svg"
                alt="Vue.js"
              />
            </div>
            <span class="card-title">Vue.js</span>
          </div>
          <div class="card">
            <div class="card-icon">
              <img
                src="https://upload.wikimedia.org/wikipedia/commons/9/99/Unofficial_JavaScript_logo_2.svg"
                alt="JavaScript"
              />
            </div>
            <span class="card-title">JavaScript</span>
          </div>
          <div class="card">
            <div class="card-icon">
              <img
                src="https://upload.wikimedia.org/wikipedia/commons/6/62/CSS3_logo.svg"
                alt="CSS3"
              />
            </div>
            <span class="card-title">CSS3</span>
          </div>
          <div class="card">
            <div class="card-icon">
              <img
                src="https://upload.wikimedia.org/wikipedia/commons/6/61/HTML5_logo_and_wordmark.svg"
                alt="HTML5"
              />
            </div>
            <span class="card-title">HTML5</span>
          </div>
          <div class="card">
            <div class="card-icon">
              <img
                src="https://upload.wikimedia.org/wikipedia/commons/8/8e/Nextjs-logo.svg"
                alt="Next.js"
              />
            </div>
            <span class="card-title">Next.js</span>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
