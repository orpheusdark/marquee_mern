<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feature Update</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f7fb;
        color: #1f2937;
      }
      .container {
        max-width: 900px;
        margin: 40px auto;
        padding: 24px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        color: #2563eb;
      }
      .content {
        display: flex;
        gap: 24px;
        align-items: center;
        flex-wrap: wrap;
      }
      .text {
        flex: 1;
        min-width: 280px;
      }
      .image {
        flex: 1;
        min-width: 280px;
      }
      img {
        width: 100%;
        border-radius: 10px;
        display: block;
      }
      .badge {
        display: inline-block;
        padding: 6px 10px;
        background: #dbeafe;
        color: #1d4ed8;
        border-radius: 999px;
        font-size: 0.9rem;
        margin-bottom: 12px;
      }
      ul {
        padding-left: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="text">
          <span class="badge">New Feature Update</span>
          <h1>Smarter Workflow for Your Team</h1>
          <p>
            We’ve launched a fresh update designed to make everyday tasks
            faster, clearer, and more reliable.
          </p>
          <ul>
            <li>Faster performance and smoother navigation</li>
            <li>Improved collaboration tools</li>
            <li>Cleaner dashboard experience</li>
          </ul>
        </div>
        <div class="image">
          <img
            src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=900&q=80"
            alt="Team reviewing a feature update"
          />
        </div>
      </div>
    </div>
  </body>
</html>
